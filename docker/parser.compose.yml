# Парсер «Задание на проектирование» (Минстрой 01.00) — отдельный HTTP API.
# Proxy defaults: docker/proxy.defaults.yml

x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru,.usl.eurochem.ru}

x-proxy-runtime-env: &proxy-runtime-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru,.usl.eurochem.ru}

services:
  design-assignment-parser:
    build:
      context: ../design-assignment-parser
      args:
        <<: *proxy-build-args
        SKIP_APT_PACKAGES: ${SKIP_APT_PACKAGES:-1}
    ports:
      - "${DESIGN_ASSIGNMENT_PARSER_PORT:-8200}:8200"
    environment:
      <<: *proxy-runtime-env
      ACTIVE_MINSTROY_DESIGN_ASSIGNMENT_SCHEMA_VERSION: ${ACTIVE_MINSTROY_DESIGN_ASSIGNMENT_SCHEMA_VERSION:-v01_00}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-rus+eng}
      OCR_DPI: ${OCR_DPI:-300}
    volumes:
      - design_assignment_parser_jobs:/app/data/jobs

volumes:
  design_assignment_parser_jobs:
