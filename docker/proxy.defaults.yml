# Canonical corporate proxy defaults for docker compose.
# Copy into build.args and environment blocks (Compose does not share YAML anchors across includes).
#
# Build args / runtime:
#   HTTP_PROXY: ${HTTP_PROXY:-}
#   HTTPS_PROXY: ${HTTPS_PROXY:-}
#   NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru}
#
# Full .env template: docker/proxy.env.example

x-proxy-no-proxy-default: >-
  localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru
