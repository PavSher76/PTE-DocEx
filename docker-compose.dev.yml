# Разработка с hot-reload и bind-mount исходников.
# Не использовать на /Volumes/Внешний/… (кириллица) — Docker Desktop падает на mount.
# Работает из ~/Projects/PTE-DocEx или внутреннего диска.
#
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend/app:/app/app
      - ./backend/storage:/app/storage

  frontend:
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
