# Corporate DNS for containers (resolves internal hostnames).
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.corp-network.yml up --build
#
# Set CORP_DNS in .env (on Windows: ipconfig /all → DNS Servers).

x-corp-dns: &corp-dns
  dns:
    - ${CORP_DNS:?Set CORP_DNS in .env}

services:
  backend:
    <<: *corp-dns
  frontend:
    <<: *corp-dns
  languagetool:
    <<: *corp-dns
  postgres:
    <<: *corp-dns
  redis:
    <<: *corp-dns
  minio:
    <<: *corp-dns
  minio-init:
    <<: *corp-dns
  qdrant:
    <<: *corp-dns
  rag-api:
    <<: *corp-dns
  rag-worker:
    <<: *corp-dns
  rag-admin-ui:
    <<: *corp-dns
  design-assignment-parser:
    <<: *corp-dns
