# Windows Docker Desktop + corporate VPN/LAN.
# Maps proxy hostname to IP inside containers and sets corporate DNS.
#
# Run once (PowerShell):
#   .\scripts\powershell\Setup-DockerCorp.ps1 -Apply
#
# Then:
#   docker compose -f docker-compose.yml -f docker-compose.corp-windows.yml up --build
#
# Requires in .env: HTTP_PROXY, HTTPS_PROXY, CORP_DNS, CORP_PROXY_HOST, CORP_PROXY_IP

x-corp-windows: &corp-windows
  dns:
    - ${CORP_DNS:?Set CORP_DNS in .env}
  extra_hosts:
    - "${CORP_PROXY_HOST:?Set CORP_PROXY_HOST in .env}:${CORP_PROXY_IP:?Set CORP_PROXY_IP in .env}"

services:
  backend:
    <<: *corp-windows
  frontend:
    <<: *corp-windows
  languagetool:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  postgres:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  redis:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  minio:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  minio-init:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  qdrant:
    dns:
      - ${CORP_DNS:?Set CORP_DNS in .env}
  rag-api:
    <<: *corp-windows
  rag-worker:
    <<: *corp-windows
  rag-admin-ui:
    <<: *corp-windows
  design-assignment-parser:
    <<: *corp-windows
