# Proxy defaults: docker/proxy.defaults.yml

x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local}

x-proxy-runtime-env: &proxy-runtime-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local}

services:
  parser-api:
    build:
      context: .
      args:
        <<: *proxy-build-args
        SKIP_APT_PACKAGES: ${SKIP_APT_PACKAGES:-1}
    ports:
      - "8200:8200"
    environment:
      <<: *proxy-runtime-env
      ACTIVE_MINSTROY_DESIGN_ASSIGNMENT_SCHEMA_VERSION: v01_00
      OCR_LANGUAGE: rus+eng
      OCR_DPI: "300"
    volumes:
      - ./data/jobs:/app/data/jobs
      - ./schemas:/app/schemas:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8200
