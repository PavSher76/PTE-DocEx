name: pte-docex

# Proxy defaults: docker/proxy.defaults.yml
x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru,.usl.eurochem.ru}

x-proxy-runtime-env: &proxy-runtime-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local,.eurochem.ru,.tgp.eurochem.ru,.usl.eurochem.ru}

include:
  - path: docker/rag.compose.yml
  - path: docker/parser.compose.yml

services:
  backend:
    build:
      context: ./backend
      args:
        <<: *proxy-build-args
        SKIP_APT_PACKAGES: ${SKIP_APT_PACKAGES:-1}
    # Hot-reload с bind-mount: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
    # Corporate DNS: docker compose -f docker-compose.yml -f docker-compose.corp-network.yml up --build
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *proxy-runtime-env
      DATABASE_URL: sqlite:///./storage/app.db
      LANGUAGETOOL_URL: http://languagetool:8010/v2/check
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-180}
      LANGUAGETOOL_LANGUAGE: ${LANGUAGETOOL_LANGUAGE:-ru-RU}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-rus+eng}
      OCR_DPI: ${OCR_DPI:-300}
      OCR_PSM_MODES: ${OCR_PSM_MODES:-3,6}
      OCR_USE_TEXT_LAYER: ${OCR_USE_TEXT_LAYER:-true}
      OCR_MIN_TEXT_LAYER_CHARS: ${OCR_MIN_TEXT_LAYER_CHARS:-40}
      DOCUMENT_SIMILARITY_THRESHOLD: ${DOCUMENT_SIMILARITY_THRESHOLD:-0.985}
      PAGE_SIMILARITY_WARNING_THRESHOLD: ${PAGE_SIMILARITY_WARNING_THRESHOLD:-0.95}
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-150}
      RAG_ENABLED: ${RAG_ENABLED:-true}
      RAG_API_URL: ${RAG_API_URL:-http://rag-api:8100}
      RAG_HTTP_TIMEOUT_SECONDS: ${RAG_HTTP_TIMEOUT_SECONDS:-120}
      RAG_COLLECTION_PROJECT_ANALYSIS: ${RAG_COLLECTION_PROJECT_ANALYSIS:-project_analysis_text}
    volumes:
      - backend_storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      languagetool:
        condition: service_started
      rag-api:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    deploy:
      resources:
        limits:
          cpus: "8"

  frontend:
    build:
      context: ./frontend
      args:
        <<: *proxy-build-args
    platform: ${DOCKER_PLATFORM:-}
    ports:
      - "5173:5173"
    environment:
      <<: *proxy-runtime-env
    depends_on:
      - backend

  languagetool:
    image: erikvl87/languagetool:latest
    ports:
      - "8010:8010"

volumes:
  backend_storage:
