# Proxy defaults: docker/proxy.defaults.yml

x-proxy-build-args: &proxy-build-args
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local}

x-proxy-runtime-env: &proxy-runtime-env
  HTTP_PROXY: ${HTTP_PROXY:-}
  HTTPS_PROXY: ${HTTPS_PROXY:-}
  NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,host.docker.internal,.local}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-rag_platform}
      POSTGRES_USER: ${POSTGRES_USER:-rag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rag_secret}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - rag_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rag} -d ${POSTGRES_DB:-rag_platform}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ragminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ragminio_secret}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - rag_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
      mc mb -p local/$${MINIO_BUCKET:-documents} || true;
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-ragminio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-ragminio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-documents}

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - rag_qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\n\\r\\n\" >&3 && grep -q readyz <&3'"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
      args:
        <<: *proxy-build-args
        SKIP_APT_PACKAGES: ${SKIP_APT_PACKAGES:-1}
    env_file:
      - ../.env
    environment:
      <<: *proxy-runtime-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_secret}@postgres:5432/${POSTGRES_DB:-rag_platform}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
    ports:
      - "${API_PORT:-8100}:8100"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ../packages:/app/packages:ro
      - ../apps/api/app:/app/apps/api/app:ro
    command: uvicorn app.main:app --host 0.0.0.0 --port 8100 --reload

  admin-ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../apps/admin-ui:/app
    ports:
      - "${ADMIN_UI_PORT:-5174}:5174"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      <<: *proxy-runtime-env
      VITE_API_URL: http://127.0.0.1:8100
    depends_on:
      - api

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
      args:
        <<: *proxy-build-args
        SKIP_APT_PACKAGES: ${SKIP_APT_PACKAGES:-1}
    env_file:
      - ../.env
    environment:
      <<: *proxy-runtime-env
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-rag}:${POSTGRES_PASSWORD:-rag_secret}@postgres:5432/${POSTGRES_DB:-rag_platform}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      QDRANT_URL: http://qdrant:6333
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ../packages:/app/packages:ro
      - ../apps/worker/app:/app/apps/worker/app:ro
    command: python -m app.worker

volumes:
  rag_postgres_data:
  rag_minio_data:
  rag_qdrant_data:
